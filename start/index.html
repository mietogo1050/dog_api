<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐶 わんこ画像ギャラリー (Dog API サンプル)</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <!-- カスタムCSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light font-noto">

  <div class="container my-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card shadow border-0 text-center">
          <div class="card-header bg-primary text-white py-3">
            <h1 class="h4 mb-0">🐶 今日のわんこ 🐶</h1>
          </div>
          <div class="card-body p-4">
            <!-- 犬種のセレクトボックス -->
            <select name="breeds" id="breeds-select">
              <option value="akita">Akita</option>
            </select>
            <!-- 画像表示エリア -->
            <div class="image-container d-flex align-items-center justify-content-center bg-dark rounded mb-4" style="height: 350px;">
              <!-- 犬の画像を表示するimgタグ（最初は空） -->
              <img id="dog-image" src="" alt="犬の画像" class="img-fluid rounded" style="max-height: 100%; object-fit: contain;">
            </div>

            <!-- 操作ボタン -->
            <button id="btn-fetch" class="btn btn-lg btn-success w-100 py-3 shadow-sm fw-bold">
              次のわんこを見る 🐾
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- JavaScript -->
  <script src="js/script.js"></script>
</body>
</html>
